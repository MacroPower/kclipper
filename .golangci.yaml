# This file contains all available configuration options
# with their default values.
version: "2"
run:
  # Timeout for analysis, e.g. 30s, 5m. Set generously: CI runs lint with a
  # cold build cache after dependency bumps, where a full reanalysis can exceed
  # several minutes. A 5m limit was tripping intermittently on those runs.
  timeout: 15m
  allow-parallel-runners: true

output:
  show-stats: true

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - golines
  settings:
    gci:
      sections:
        - standard
        - default
        - blank
        - dot
        - alias
        - localmodule
    gofmt:
      simplify: true
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
    gofumpt:
      extra-rules: true
    golines:
      reformat-tags: false
      max-len: 120

linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - contextcheck
    - depguard
    - dupl
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forcetypeassert
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    # TODO: enable godoclint; extensive findings (50) as of 2026-06-12.
    # - godoclint
    - godot
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - intrange
    - iotamixing
    # - ireturn
    - makezero
    - mirror
    - misspell
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - noinlineerr
    # - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    # - perfsprint
    # - prealloc
    - predeclared
    - reassign
    # - recvcheck
    # - revive
    - sloglint
    - staticcheck
    - tagalign
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - wrapcheck
    - wsl_v5

  settings:
    misspell:
      locale: US
      mode: default

    exhaustive:
      default-signifies-exhaustive: true

    wsl_v5:
      allow-whole-block: true
      case-max-lines: 2
      default: all
      disable:
        - assign-exclusive
        - if

    unused:
      field-writes-are-uses: false
      exported-fields-are-used: false
      local-variables-are-used: false

    govet:
      enable-all: true
      disable:
        - shadow

    usetesting:
      os-temp-dir: true
      context-background: true
      context-todo: true

    testifylint:
      enable-all: true
      expected-actual:
        pattern: ^want

    sloglint:
      attr-only: true
      static-msg: true
      args-on-sep-lines: true
      key-naming-case: snake
      context: scope
      forbidden-keys:
        - time
        - level
        - msg

    gocritic:
      enable-all: true
      disabled-checks:
        - unnamedResult
        - singleCaseSwitch
      settings:
        hugeParam:
          sizeThreshold: 256

    godoclint:
      default: all
      disable:
        - require-pkg-doc
      options:
        max-len:
          length: 88

    godot:
      scope: noinline
      period: true
      capital: true

    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
        - os.Remove
        - os.RemoveAll

    grouper:
      import-require-single-import: true
      var-require-single-var: true

    depguard:
      rules:
        main:
          deny:
            - pkg: "golang.org/x/exp/slog"
              desc: use log/slog
            - pkg: "github.com/pkg/errors"
              desc: use errors

    importas:
      alias:
        - pkg: github.com/charmbracelet/bubbletea
          alias: tea

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - promlinter
          - goconst
          - gocritic
          - godot
          - gosec
          - gosmopolitan
          - godoclint
      - path: _test\.go
        text: "fieldalignment:"
      - source: "= `"
        linters:
          - grouper
      # Command wiring runs sequentially and surfaces wrapped errors via the
      # CLI, so these checks add noise without value there.
      - path: cmd/
        linters:
          - wrapcheck
          - paralleltest
      # Plain slog calls are intentional at the top level; noctx otherwise
      # demands the *Context logging variants everywhere.
      - text: "slog\\."
        linters:
          - noctx
